<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gantt Chart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        h3 {
            color: #555;
            margin: 20px 0 10px;
            font-size: 18px;
        }

        .file-upload {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .file-upload label {
            font-weight: 600;
            color: #555;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .file-info {
            color: #888;
            font-size: 13px;
            margin-left: 10px;
        }

        .gantt-wrapper {
            margin-top: 20px;
        }

        .gantt-grid {
            display: grid;
            grid-template-columns: 100px 1fr;
            gap: 0;
        }

        .gantt-labels {
            display: flex;
            flex-direction: column;
        }

        .gantt-label {
            height: 35px;
            display: flex;
            align-items: center;
            font-weight: 600;
            font-size: 13px;
            color: #555;
            padding-right: 10px;
        }

        .bars-container {
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .gantt-row {
            height: 35px;
            position: relative;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }

        .gantt-row:nth-child(even) {
            background: #fff;
        }

        .gantt-bar {
            position: absolute;
            height: 25px;
            top: 5px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 10px;
            font-weight: 600;
            min-width: 2px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .gantt-bar:hover {
            transform: scaleY(1.2);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .time-indicator {
            position: absolute;
            width: 2px;
            background: #ff4757;
            top: 0;
            z-index: 10;
            pointer-events: none;
            transition: left 0.1s;
        }

        .timeline-container {
            margin-top: 5px;
            display: grid;
            grid-template-columns: 100px 1fr;
        }

        .timeline {
            position: relative;
            height: 20px;
        }

        .timeline-mark {
            font-size: 11px;
            color: #888;
            text-align: center;
            position: absolute;
            top: 0;
        }

        .timeline-mark::before {
            content: '|';
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            color: #ccc;
        }

        .slider-container {
            margin-top: 15px;
            display: grid;
            grid-template-columns: 100px 1fr;
        }

        .slider {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .current-time {
            margin: 15px 0;
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .time-value {
            color: #667eea;
            font-size: 20px;
            margin-left: 10px;
        }

        .active-table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        .active-table th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }

        .active-table td {
            padding: 12px;
            border-bottom: 1px solid #e9ecef;
        }

        .active-table tbody tr:hover {
            background: #f8f9fa;
        }

        .no-data {
            text-align: center;
            color: #888;
            padding: 20px;
        }

        .legend {
            display: flex;
            gap: 20px;
            margin: 10px 0;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
            color: #666;
        }

        .legend-color {
            width: 15px;
            height: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 3px;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin: 15px 0;
            color: #666;
        }

        .stats span {
            font-weight: 600;
            color: #333;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .empty-state svg {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Спутники</h2>
        
        <div class="file-upload">
            <label>Загрузить данные из файла:</label>
            <input type="file" id="fileInput" accept=".txt" style="display: none;">
            <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
                Выбрать файл
            </button>
            <span class="file-info" id="fileInfo"></span>
        </div>
        
        <div class="stats" id="stats" style="display: none;">
            <div>Вершин: <span id="statVertices">0</span></div>
            <div>Интервалов: <span id="statIntervals">0</span></div>
            <div>Макс. время: <span id="statMaxTime">0</span></div>
        </div>
        
        <div id="ganttSection" style="display: none;">
            <div class="gantt-wrapper">
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-color"></div>
                        <span>Активный интервал</span>
                    </div>
                </div>
                
                <div class="gantt-grid">
                    <div class="gantt-labels" id="ganttLabels"></div>
                    <div class="bars-container" id="barsContainer">
                        <div class="time-indicator" id="timeIndicator"></div>
                    </div>
                </div>
                
                <div class="timeline-container">
                    <div></div>
                    <div class="timeline" id="timeline"></div>
                </div>
                
                <div class="slider-container">
                    <div></div>
                    <input type="range" id="timeSlider" class="slider" min="0" max="100" value="0" step="1">
                </div>
            </div>
            
            <div class="current-time">
                Текущее время: <span class="time-value" id="timeValue">0</span>
            </div>
            
            <h3>Активные соединения в момент <span id="tableTime">0</span></h3>
            <table class="active-table" id="activeTable">
                <thead>
                    <tr>
                        <th>Ребро</th>
                        <th>Начало</th>
                        <th>Конец</th>
                        <th>Длительность</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td colspan="4" class="no-data">Переместите ползунок для просмотра активных соединений</td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="empty-state" id="emptyState">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            <p>Загрузите файл с данными</p>
            <p style="font-size: 12px; margin-top: 10px;">Формат файла: n m (вершины интервалы)<br>затем строки: a b start end</p>
        </div>
    </div>

    <script>
        let intervals = [];
        let maxT = 100;
        let verticesN = 0;

        function parseData(content) {
            const lines = content.split('\n').filter(line => line.trim());
            if (lines.length === 0) {
                alert('Файл пуст');
                return;
            }
            
            const [n, m] = lines[0].split(' ').map(Number);
            verticesN = n;
            intervals = [];
            
            for (let i = 1; i <= m && i < lines.length; i++) {
                const [a, b, start, end] = lines[i].split(' ').map(Number);
                if (!isNaN(a) && !isNaN(b) && !isNaN(start) && !isNaN(end)) {
                    if (end > maxT) maxT = end;
                    intervals.push({ a, b, start, end });
                }
            }
            
            // Округляем maxT до ближайшего десятка
            maxT = Math.ceil(maxT / 10) * 10;
            
            updateStats();
            generateChart();
            
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('ganttSection').style.display = 'block';
            document.getElementById('stats').style.display = 'flex';
        }

        function updateStats() {
            document.getElementById('statVertices').textContent = verticesN;
            document.getElementById('statIntervals').textContent = intervals.length;
            document.getElementById('statMaxTime').textContent = maxT;
        }

        function generateChart() {
    const labelsContainer = document.getElementById('ganttLabels');
    const barsContainer = document.getElementById('barsContainer');
    const timeline = document.getElementById('timeline');
    const slider = document.getElementById('timeSlider');
    
    labelsContainer.innerHTML = '';
    barsContainer.innerHTML = '<div class="time-indicator" id="timeIndicator"></div>';
    timeline.innerHTML = '';
    
    intervals.forEach((interval) => {
        const label = document.createElement('div');
        label.className = 'gantt-label';
        label.textContent = `Ребро ${interval.a}-${interval.b}`;
        labelsContainer.appendChild(label);
        
        const row = document.createElement('div');
        row.className = 'gantt-row';
        
        const left = (interval.start / maxT) * 100;
        const width = ((interval.end - interval.start) / maxT) * 100;
        
        const bar = document.createElement('div');
        bar.className = 'gantt-bar';
        bar.style.left = left + '%';
        bar.style.width = Math.max(width, 1.5) + '%';
        bar.title = `[${interval.start}-${interval.end}]`;
        if (width > 8) {
            bar.textContent = `${interval.start}-${interval.end}`;
        }
        
        bar.addEventListener('click', () => {
            slider.value = interval.start;
            updateTimeDisplay(interval.start);
        });
        
        row.appendChild(bar);
        barsContainer.appendChild(row);
    });
    
    // Исправленная временная шкала с точным позиционированием
    for (let t = 0; t <= maxT; t += 10) {
        const mark = document.createElement('div');
        mark.className = 'timeline-mark';
        mark.style.position = 'absolute';
        mark.style.left = (t / maxT * 100) + '%';
        mark.style.transform = 'translateX(-50%)';
        mark.textContent = t;
        timeline.appendChild(mark);
    }
    
    slider.max = maxT;
    slider.value = 0;
    
    slider.oninput = function() {
        updateTimeDisplay(parseInt(this.value));
    };
    
    updateTimeDisplay(0);
}

        function updateTimeDisplay(time) {
            document.getElementById('timeValue').textContent = time;
            document.getElementById('tableTime').textContent = time;
            updateTimeIndicator(time);
            updateActiveTable(time);
        }

        function updateTimeIndicator(time) {
            const indicator = document.getElementById('timeIndicator');
            const barsContainer = document.getElementById('barsContainer');
            const containerWidth = barsContainer.offsetWidth;
            const leftPosition = (time / maxT) * containerWidth;
            
            indicator.style.left = leftPosition + 'px';
            indicator.style.height = barsContainer.offsetHeight + 'px';
        }

        function updateActiveTable(time) {
            const table = document.getElementById('activeTable');
            const active = intervals.filter(i => time >= i.start && time < i.end);
            
            let html = `
                <thead>
                    <tr>
                        <th>Ребро</th>
                        <th>Начало</th>
                        <th>Конец</th>
                        <th>Длительность</th>
                    </tr>
                </thead>
                <tbody>
            `;
            
            if (active.length === 0) {
                html += '<tr><td colspan="4" class="no-data">Нет активных соединений</td></tr>';
            } else {
                active.forEach(i => {
                    html += `
                        <tr>
                            <td><strong>${i.a}-${i.b}</strong></td>
                            <td>${i.start}</td>
                            <td>${i.end}</td>
                            <td>${i.end - i.start}</td>
                        </tr>
                    `;
                });
            }
            
            html += '</tbody>';
            table.innerHTML = html;
        }

        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            document.getElementById('fileInfo').textContent = file.name;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                parseData(event.target.result);
            };
            reader.readAsText(file);
        });

        window.addEventListener('resize', () => {
            if (intervals.length > 0) {
                const slider = document.getElementById('timeSlider');
                updateTimeIndicator(parseInt(slider.value));
            }
        });
    </script>
</body>
</html>
